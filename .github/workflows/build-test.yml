name: Build and Test

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    name: Build - Debug

    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: |
            10.0.x

    - name: Install dependencies
      run: dotnet restore WinformsLegacy.sln

    - name: Build
      run: dotnet build WinformsLegacy.sln --configuration Debug --no-restore

    - name: Test
      run: >
        dotnet test
        src/System.Windows.Forms.Legacy/System.Windows.Forms.Legacy.Tests/System.Windows.Forms.Legacy.Tests.csproj
        --configuration Debug
        --no-restore
        --logger trx
        --results-directory TestResults
